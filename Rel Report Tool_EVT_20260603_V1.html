<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rel Report Tool_EVT_20260603_V1</title>

 <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">


    <script src="/.tailwindcss.js"></script>
    <script src="./react.production.min.js"></script>
    <script src="./react-dom.production.min.js"></script>
    <script src="./babel.min.js"></script>
    <script src="./xlsx.bundle.js"></script>
    <script src="./chart.js"></script>


    <script src="./xlsx.full.min.js"></script>
    <script src="./lucide@latest"></script>
   

    <style>
        html, body, #root { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        /* 隱藏捲軸但保持功能 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 p-4 sm:p-8 overflow-auto select-none">

    <div id="root" class="size-full"></div>

    <script>
        const { useState, useRef, useEffect } = React;
        const e = React.createElement;

        function App() {
            // 自動從瀏覽器/手機本地空間還原上一次的資料
            const [dataList, setDataList] = useState(() => {
                try {
                    const saved = localStorage.getItem('rel_report_data_list');
                    return saved ? JSON.parse(saved) : [];
                } catch(err) { return []; }
            });
            const [queryHistory, setQueryHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('rel_report_query_history');
                    return saved ? JSON.parse(saved) : [];
                } catch(err) { return []; }
            });

            const [inputValue, setInputValue] = useState('');
            const [results, setResults] = useState([]);

            // 新增測試項目的狀態
            const [newNum1, setNewNum1] = useState('');
            const [newNum2, setNewNum2] = useState('');
            const [newDesc, setNewDesc] = useState('');

            // 文件上傳引用
            const fileInputRef = useRef(null);
            // 歷史紀錄容器引用（用於自動捲動）
            const historyContainerRef = useRef(null);

            // 選擇測試項目的狀態
            const [selectedIndices, setSelectedIndices] = useState(new Set());

            // 監聽變動：當測試項目清單更新時，寫入本地儲存庫
            useEffect(() => {
                localStorage.setItem('rel_report_data_list', JSON.stringify(dataList));
            }, [dataList]);

            // 監聽變動：當查詢歷史更新時，寫入本地儲存庫
            useEffect(() => {
                localStorage.setItem('rel_report_query_history', JSON.stringify(queryHistory));
            }, [queryHistory]);

            // 當歷史紀錄有新項目加入時，自動捲動到最底部
            useEffect(() => {
                if (historyContainerRef.current) {
                    historyContainerRef.current.scrollTop = historyContainerRef.current.scrollHeight;
                }
            }, [queryHistory]);

            // 重新渲染後動態載入 Lucide 圖標
            useEffect(() => {
                try {
                    if (window.lucide && typeof window.lucide.createIcons === 'function') {
                        window.lucide.createIcons();
                    }
                } catch (err) { console.log("Waiting for Lucide icons..."); }
            }, [dataList, results, selectedIndices, queryHistory]);

            // 查詢邏輯
            const handleSearch = () => {
                if (!inputValue.trim()) {
                    setResults([]);
                    return;
                }
                const searchIds = inputValue.split(/[,，]/).map(id => id.trim()).filter(id => id);
                const matchedResults = dataList.filter(item => {
                    const itemId = item.split('@')[0];
                    return searchIds.includes(itemId);
                });
                setResults(matchedResults);
            };

            const handleKeyPress = (evt) => {
                if (evt.key === 'Enter') {
                    handleSearch();
                }
            };

            // 記錄至歷史紀錄的共用函數
            const recordToHistory = (resultText) => {
                // 產生與截圖相符的 12小時制時間格式 (YYYY/MM/DD 上午/下午 HH:MM:SS)
                const timeString = new Date().toLocaleString('zh-TW', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: true 
                });

                const newHistoryItem = {
                    id: Date.now(),
                    queryText: inputValue.trim(),
                    resultText: resultText,
                    matchCount: results.length,
                    timestamp: timeString
                };
                
                // 【修改點】改為 [...prev, newHistoryItem] 讓新資料排在後面，並保留最後 50 筆
                setQueryHistory(prev => [...prev, newHistoryItem].slice(-50));
            };

            // 複製結果並觸發歷史紀錄
            const handleCopyResults = () => {
                if (results.length === 0) {
                    alert('沒有可複製的查詢結果');
                    return;
                }
                const resultText = results.join(', ');
                
                navigator.clipboard.writeText(resultText)
                    .then(() => {
                        alert('已複製到剪貼簿！');
                        recordToHistory(resultText); // 複製成功後寫入歷史
                    })
                    .catch(() => {
                        alert('複製失敗，請手動選取複製。');
                        recordToHistory(resultText);
                    });
            };

            // 快捷複製特定的歷史紀錄
            const handleCopySpecificHistory = (text) => {
                navigator.clipboard.writeText(text)
                    .then(() => alert('已複製到剪貼簿！\n\n' + text))
                    .catch(() => alert('複製失敗，請手動選取複製。'));
            };

            // 匯出歷史紀錄為 CSV
            const handleExportHistory = () => {
                if (queryHistory.length === 0) {
                    alert('目前沒有歷史紀錄可以匯出。');
                    return;
                }

                // 將歷史紀錄轉換為適合匯出的格式
                const exportData = queryHistory.map((item, index) => ({
                    '序號': index + 1, // 順向匯出 1, 2, 3...
                    '時間': item.timestamp,
                    '輸入條件': item.queryText,
                    '查詢結果': item.resultText
                }));

                const worksheet = XLSX.utils.json_to_sheet(exportData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, '查詢歷史紀錄');

                // 產生檔案名稱 (含時間戳記)
                const dateStr = new Date().toISOString().replace(/[:T]/g, '-').split('.')[0];
                const fileName = `REL_查詢歷史紀錄_${dateStr}.csv`;

                XLSX.writeFile(workbook, fileName, { bookType: 'csv' });
            };

            const handleClearHistory = () => {
                if (confirm('確定要清空所有的查詢歷史紀錄嗎？')) {
                    setQueryHistory([]);
                }
            };

            // 手動新增測試項目
            const handleAddRecord = () => {
                if (!newNum1.trim() || !newNum2.trim() || !newDesc.trim()) {
                    alert('請填寫所有欄位');
                    return;
                }
                const newRecord = `${newNum1.trim()}@${newNum2.trim()} ${newDesc.trim()}`;

                const exists = dataList.some(item => item.split('@')[0] === newNum1.trim());
                if (exists) {
                    alert('編號1已存在，請使用不同的編號');
                    return;
                }

                setDataList([...dataList, newRecord]);
                setNewNum1('');
                setNewNum2('');
                setNewDesc('');
            };

            const handleDeleteRecord = (index) => {
                if (confirm('確定要刪除這筆測試項目嗎？')) {
                    setDataList(dataList.filter((_, i) => i !== index));
                    const newSelected = new Set(selectedIndices);
                    newSelected.delete(index);
                    setSelectedIndices(newSelected);
                }
            };

            // 使用 ArrayBuffer 模式讀取 Excel/CSV (防止中文亂碼)
            const handleFileUpload = (evt) => {
                const file = evt.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const fileData = event.target?.result;
                        if (!fileData) return;

                        const workbook = XLSX.read(fileData, { type: 'array' });
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        const importedRecords = [];
                        const existingIds = new Set(dataList.map(item => item.split('@')[0]));
                        let duplicateCount = 0;

                        const startRow = (jsonData[0]?.[0] === '編號1' || jsonData[0]?.[0] === '編號1') ? 1 : 0;

                        for (let i = startRow; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            if (!row || row.length === 0) continue;

                            let record = '';

                            if (row.length === 1 && typeof row[0] === 'string' && row[0].includes('@')) {
                                record = row[0].trim();
                            }
                            else if (row.length >= 2) {
                                const firstCol = String(row[0] || '').trim();
                                
                                if (row.length >= 3 && row[2] !== undefined && String(row[2]).trim() !== '') {
                                    const num1 = firstCol;
                                    const num2 = String(row[1] || '').trim();
                                    const desc = String(row[2] || '').trim();
                                    if (num1 && num2 && desc) {
                                        record = `${num1}@${num2} ${desc}`;
                                    }
                                } 
                                else if (firstCol.includes('@')) {
                                    const desc = String(row[1] || '').trim();
                                    if (desc) {
                                        record = `${firstCol} ${desc}`;
                                    }
                                }
                            }

                            if (record) {
                                const recordId = record.split('@')[0];
                                if (!existingIds.has(recordId)) {
                                    importedRecords.push(record);
                                    existingIds.add(recordId);
                                } else {
                                    duplicateCount++;
                                }
                            }
                        }

                        if (importedRecords.length > 0) {
                            setDataList([...dataList, ...importedRecords]);
                            let message = `成功匯入 ${importedRecords.length} 筆測試項目`;
                            if (duplicateCount > 0) message += `\n跳過 ${duplicateCount} 筆重複測試項目`;
                            alert(message);
                        } else {
                            alert('未找到有效的測試項目，請確認 Excel 欄位內含有測項名稱。');
                        }
                    } catch (error) {
                        alert('檔案解析失敗，請確認檔案為正常的 CSV 或 Excel 格式');
                        console.error(error);
                    }
                };

                reader.readAsArrayBuffer(file);
                evt.target.value = ''; 
            };

            const toggleSelectRecord = (index) => {
                const newSelected = new Set(selectedIndices);
                if (newSelected.has(index)) {
                    newSelected.delete(index);
                } else {
                    newSelected.add(index);
                }
                setSelectedIndices(newSelected);
            };

            const toggleSelectAll = () => {
                if (selectedIndices.size === dataList.length) {
                    setSelectedIndices(new Set());
                } else {
                    setSelectedIndices(new Set(dataList.map((_, index) => index)));
                }
            };

            const handleDeleteSelected = () => {
                if (selectedIndices.size === 0) {
                    alert('請先選擇要刪除的測試項目');
                    return;
                }
                if (confirm(`確定要刪除選中的 ${selectedIndices.size} 筆測試項目嗎？`)) {
                    setDataList(dataList.filter((_, index) => !selectedIndices.has(index)));
                    setSelectedIndices(new Set());
                }
            };

            return e('div', { className: 'max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6' },
                
                // 左側：查詢與歷史紀錄區域
                e('div', { className: 'space-y-6 h-fit' },
                    // 查詢主面板
                    e('div', { className: 'bg-white rounded-2xl shadow-2xl overflow-hidden' },
                        e('div', { className: 'bg-gradient-to-r from-blue-600 to-indigo-600 p-6' },
                            e('h1', { className: 'text-white text-2xl font-bold text-center' }, '測試項目查詢'),
                            e('p', { className: 'text-blue-100 text-center mt-2' }, '輸入編號1查詢完整測試項目')
                        ),
                        e('div', { className: 'p-6' },
                            e('div', { className: 'mb-6' },
                                e('label', { className: 'block text-gray-700 font-semibold mb-3' }, '輸入編號1：'),
                                e('div', { className: 'flex gap-3' },
                                    e('input', {
                                        type: 'text',
                                        value: inputValue,
                                        onChange: (e) => setInputValue(e.target.value),
                                        onKeyPress: handleKeyPress,
                                        placeholder: '例如: 101,103,105',
                                        className: 'flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition-colors'
                                    }),
                                    e('button', {
                                        onClick: handleSearch,
                                        className: 'px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2 font-semibold'
                                    }, e('i', { 'data-lucide': 'search', className: 'w-5 h-5' }), '查詢')
                                )
                            ),
                            e('div', null,
                                e('div', { className: 'flex items-center justify-between mb-3' },
                                    e('label', { className: 'block text-gray-700 font-semibold' }, '查詢結果：'),
                                    results.length > 0 ? e('button', {
                                        onClick: handleCopyResults,
                                        className: 'px-3 py-1.5 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1.5'
                                    }, e('i', { 'data-lucide': 'copy', className: 'w-4 h-4' }), '複製結果並紀錄') : null
                                ),
                                e('div', { className: 'min-h-[200px] border-2 border-gray-300 rounded-lg p-4 bg-gray-50' },
                                    (results.length === 0 && inputValue.trim() !== '') ? e('div', { className: 'text-center text-gray-500 py-8' }, e('p', null, '未找到匹配的測試項目')) : null,
                                    (results.length === 0 && inputValue.trim() === '') ? e('div', { className: 'text-center text-gray-400 py-8' }, e('p', null, '請在上方輸入編號1進行查詢')) : null,
                                    results.length > 0 ? e('div', { className: 'space-y-3' },
                                        results.map((result, index) => e('div', { key: index, className: 'bg-white p-3 rounded-lg shadow-md border-l-4 border-blue-500 hover:shadow-lg transition-shadow' },
                                            e('div', { className: 'font-mono text-gray-800' }, result)
                                        ))
                                    ) : null
                                )
                            )
                        )
                    ),

                    // 查詢歷史紀錄區塊
                    e('div', { className: 'bg-white rounded-2xl shadow-2xl overflow-hidden' },
                        e('div', { className: 'bg-purple-600 px-10 py-10 border-b border-gray-200 flex justify-between items-center' },
                            e('h1', { className: 'text-white font-bold text-base flex items-center gap-3' }, 
                                e('i', { 'data-lucide': 'history', className: 'w-4 h-4 text-white-500' }), 
                                `查詢歷史紀錄 (${queryHistory.length})`
                            ),
                            queryHistory.length > 0 ? e('div', { className: 'flex gap-2' },
                                e('button', {
                                    onClick: handleExportHistory,
                                    className: 'px-3 py-1.5 text-xs bg-purple-100 text-purple-700 rounded-lg hover:bg-purple-200 transition-colors flex items-center gap-1.5 font-semibold'
                                }, e('i', { 'data-lucide': 'download', className: 'w-3.5 h-3.5' }), '匯出 CSV'),
                                e('button', {
                                    onClick: handleClearHistory,
                                    className: 'px-3 py-1.5 text-xs bg-gray-200 text-gray-700 rounded-lg hover:bg-red-100 hover:text-red-600 transition-colors'
                                }, '清除歷史')
                            ) : null
                        ),
                        // 加上 ref 用於自動滾動
                        e('div', { ref: historyContainerRef, className: 'max-h-[350px] overflow-auto custom-scrollbar bg-white min-h-[100px] relative' },
                            queryHistory.length === 0 ? e('div', { className: 'text-center text-gray-400 py-10 text-sm' }, '點擊「複製結果並紀錄」後，將顯示於此處') :
                            e('table', { className: 'w-full text-left border-collapse' },
                                e('thead', { className: 'sticky top-0 bg-slate-50 z-10 shadow-sm' },
                                    e('tr', { className: 'border-b-2 border-gray-200' },
                                        e('th', { className: 'py-3 px-3 w-12 text-center text-gray-600 font-medium whitespace-nowrap align-middle' }, 
                                            e('div', { className: 'inline-flex flex-col items-center leading-tight' }, 
                                                e('span', null, '序'), 
                                                e('span', null, '號')
                                            )
                                        ),
                                        e('th', { className: 'py-3 px-4 text-gray-600 font-medium align-middle' }, '查詢結果'),
                                        e('th', { className: 'py-3 px-4 w-44 text-gray-600 font-medium whitespace-nowrap align-middle' }, '時間')
                                    )
                                ),
                                e('tbody', { className: 'divide-y divide-gray-200' },
                                    queryHistory.map((hist, index) => e('tr', { key: hist.id, className: 'hover:bg-blue-50/50 transition-colors' },
                                        // 【修改點】index + 1 配合陣列順序，自然形成 1, 2, 3... 往下排列且新紀錄在最下方的效果
                                        e('td', { className: 'py-4 px-3 text-center text-blue-800 font-medium align-top' }, index + 1),
                                        e('td', { 
                                            className: 'py-4 px-4 font-mono text-sm text-gray-800 break-words cursor-pointer hover:text-purple-600 transition-colors',
                                            onClick: () => handleCopySpecificHistory(hist.resultText),
                                            title: '點擊複製此查詢結果'
                                        }, hist.resultText),
                                        e('td', { className: 'py-4 px-4 text-sm text-gray-500 whitespace-nowrap align-top' }, hist.timestamp)
                                    ))
                                )
                            )
                        )
                    )
                ),

                // 右側：管理清單區域
                e('div', { className: 'bg-white rounded-2xl shadow-2xl overflow-hidden h-fit' },
                    e('div', { className: 'bg-gradient-to-r from-green-600 to-emerald-600 p-6' },
                        e('h1', { className: 'text-white text-2xl font-bold text-center' }, '測試項目管理'),
                        e('p', { className: 'text-green-100 text-center mt-2' }, '建立和管理測試項目清單')
                    ),
                    e('div', { className: 'p-6' },
                        // 匯入測試項目 CSV 檔
                        e('div', { className: 'mb-6 p-4 bg-green-50 rounded-lg border border-green-200' },
                            e('h3', { className: 'font-semibold text-amber-900 mb-3' }, '匯入測試項目 CSV 檔'),
                            e('input', { ref: fileInputRef, type: 'file', accept: '.xlsx,.xls,.csv', onChange: handleFileUpload, className: 'hidden' }),
                            e('button', {
                                onClick: () => fileInputRef.current?.click(),
                                className: 'w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2 font-semibold'
                            }, e('i', { 'data-lucide': 'upload', className: 'w-5 h-5' }), '選擇 CSV / Excel 檔案匯入'),
                            e('div', { className: 'mt-3 text-xs text-amber-800' },
                                e('p', { className: 'font-semibold mb-1' }, '支援格式：'),
                                e('ul', { className: 'space-y-1' },
                                    e('li', null, '• 方式 (兩欄)：編號1@編號2 | 測項名稱')
                                )
                            )
                        ),
                        // 新增測試項目
                        e('div', { className: 'mb-6 p-4 bg-green-50 rounded-lg border border-green-200' },
                            e('h3', { className: 'font-semibold text-green-900 mb-4' }, '新增測試項目'),
                            e('div', { className: 'space-y-3' },
                                e('div', null,
                                    e('label', { className: 'block text-gray-700 text-sm font-semibold mb-1' }, '編號1：'),
                                    e('input', { type: 'text', value: newNum1, onChange: (e) => setNewNum1(e.target.value), placeholder: '例如：111', className: 'w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition-colors' })
                                ),
                                e('div', null,
                                    e('label', { className: 'block text-gray-700 text-sm font-semibold mb-1' }, '編號2：'),
                                    e('input', { type: 'text', value: newNum2, onChange: (e) => setNewNum2(e.target.value), placeholder: '例如：201', className: 'w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition-colors' })
                                ),
                                e('div', null,
                                    e('label', { className: 'block text-gray-700 text-sm font-semibold mb-1' }, '測項名稱：'),
                                    e('input', { type: 'text', value: newDesc, onChange: (e) => setNewDesc(e.target.value), placeholder: '例如：Battery Right Voltage', className: 'w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 transition-colors' })
                                ),
                                e('button', {
                                    onClick: handleAddRecord,
                                    className: 'w-full px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2 font-semibold'
                                }, e('i', { 'data-lucide': 'plus', className: 'w-5 h-5' }), '新增測試項目')
                            )
                        ),
                        // 現有測試項目清單
                        e('div', null,
                            e('div', { className: 'flex items-center justify-between mb-3' },
                                e('h3', { className: 'font-semibold text-gray-700' }, `現有測試項目 (${dataList.length} 筆) `, selectedIndices.size > 0 ? e('span', { className: 'text-blue-600 ml-2' }, `(已選 ${selectedIndices.size} 筆)`) : null),
                                e('div', { className: 'flex gap-2' },
                                    e('button', {
                                        onClick: toggleSelectAll,
                                        disabled: dataList.length === 0,
                                        className: 'px-3 py-1.5 text-sm bg-green-500 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center gap-1.5'
                                    }, selectedIndices.size === dataList.length && dataList.length > 0 ? [e('i', { key: 'icon', 'data-lucide': 'square', className: 'w-4 h-4' }), '取消全選'] : [e('i', { key: 'icon', 'data-lucide': 'check-square', className: 'w-4 h-4' }), '全選']),
                                    e('button', {
                                        onClick: handleDeleteSelected,
                                        disabled: selectedIndices.size === 0,
                                        className: 'px-3 py-1.5 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors flex items-center gap-1.5 disabled:bg-gray-400 disabled:cursor-not-allowed'
                                    }, e('i', { 'data-lucide': 'trash-2', className: 'w-4 h-4' }), '刪除選擇')
                                )
                            ),
                            e('div', { className: 'max-h-[480px] overflow-y-auto border-2 border-gray-300 rounded-lg bg-gray-50 custom-scrollbar' },
                                dataList.length === 0 ? e('div', { className: 'text-center text-gray-400 py-8' }, e('p', null, '尚無測試項目')) : e('div', { className: 'divide-y divide-gray-200' },
                                    dataList.map((item, index) => e('div', { key: index, className: `p-3 transition-colors flex items-center gap-3 group ${selectedIndices.has(index) ? 'bg-blue-50' : 'hover:bg-gray-100'}` },
                                        e('input', { type: 'checkbox', checked: selectedIndices.has(index), onChange: () => toggleSelectRecord(index), className: 'w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer' }),
                                        e('div', { className: 'font-mono text-sm text-gray-800 flex-1' }, item),
                                        e('button', {
                                            onClick: () => handleDeleteRecord(index),
                                            className: 'p-2 text-red-600 hover:bg-red-100 rounded-lg transition-colors opacity-0 group-hover:opacity-100'
                                        }, e('i', { 'data-lucide': 'trash-2', className: 'w-4 h-4' }))
                                    ))
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
