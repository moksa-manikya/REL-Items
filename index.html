"219@889 cv_temple_outer_end",
"220@891 AR1_end_dT1",
"221@893 AR1_end_dT2",
"222@895 AR2_end_dT1",
"223@897 AR2_end_dT2"

                ],
                createdAt: "2025/11/12 12:00"
 },

        ];


        function App() {
            // ── 版本管理狀態 ──────────────────────────────────────────────────
            const [versions, setVersions] = useState(() => {
                try {
                    const saved = localStorage.getItem('rel_report_versions');
                    const savedParsed = saved ? JSON.parse(saved) : [];
                    
                    if (savedParsed.length === 0) {
                        return DEFAULT_VERSIONS;
                    }
                    
                    const merged = [...savedParsed];
                    DEFAULT_VERSIONS.forEach(defaultVer => {
                        if (!merged.some(v => v.id === defaultVer.id)) {
                            merged.push(defaultVer);
                        }
                    });
                    return merged;
                } catch(err) { 
                    return DEFAULT_VERSIONS; 
                }
            });

            const [activeVersionId, setActiveVersionId] = useState(() => {
                try {
                    const savedActive = localStorage.getItem('rel_report_active_version_id');
                    if (savedActive) return savedActive;
                    return DEFAULT_VERSIONS.length > 0 ? DEFAULT_VERSIONS[0].id : null;
                } catch(err) { 
                    return DEFAULT_VERSIONS.length > 0 ? DEFAULT_VERSIONS[0].id : null; 
                }
            });

            const [showNewVersionInput, setShowNewVersionInput] = useState(false);
            const [newVersionName, setNewVersionName] = useState('');
            const [importTargetId, setImportTargetId] = useState(null);

            // ── 切換版本 Alarm 提示訊息 ───────────────────────────────────────
            const [alarmMessage, setAlarmMessage] = useState(null);

            // ── 查詢、新增、歷史紀錄與隱藏狀態 ──────────────────────────────────────
            const [inputValue, setInputValue] = useState('');
            const [results, setResults] = useState([]);
            const [newNum1, setNewNum1] = useState('');
            const [newNum2, setNewNum2] = useState('');
            const [newDesc, setNewDesc] = useState('');
            const [selectedIndices, setSelectedIndices] = useState(new Set());
            const [isManageVisible, setIsManageVisible] = useState(true); 
            
            // 💡 查詢歷史紀錄狀態
            const [queryHistory, setQueryHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('rel_report_query_history');
                    return saved ? JSON.parse(saved) : [];
                } catch(err) { return []; }
            });

            // ── 引用宣告 ──────────────────────────────────────────────────────
            const fileInputRef = useRef(null);       
            const versionFileRef = useRef(null);     
            const folderInputRef = useRef(null); 
            const historyContainerRef = useRef(null);

            // ── 衍生資料計算 ──────────────────────────────────────────────────
            const activeVersion = versions.find(v => v.id === activeVersionId) || null;
            const dataList = activeVersion ? activeVersion.items : [];

            // ── 資料同步與副作用 ───────────────────────────────────────────────
            useEffect(() => {
                localStorage.setItem('rel_report_versions', JSON.stringify(versions));
            }, [versions]);

            useEffect(() => {
                if (activeVersionId) localStorage.setItem('rel_report_active_version_id', activeVersionId);
                else localStorage.removeItem('rel_report_active_version_id');
            }, [activeVersionId]);

            useEffect(() => {
                localStorage.setItem('rel_report_query_history', JSON.stringify(queryHistory));
            }, [queryHistory]);

            useEffect(() => {
                if (historyContainerRef.current) {
                    historyContainerRef.current.scrollTop = historyContainerRef.current.scrollHeight;
                }
            }, [queryHistory]);

            useEffect(() => {
                if (alarmMessage) {
                    const timer = setTimeout(() => setAlarmMessage(null), 2000);
                    return () => clearTimeout(timer);
                }
            }, [alarmMessage]);

            useEffect(() => {
                try {
                    if (window.lucide && typeof window.lucide.createIcons === 'function') {
                        window.lucide.createIcons();
                    }
                } catch (err) { console.log("Waiting for Lucide icons..."); }
            }, [versions, activeVersionId, showNewVersionInput, dataList, results, selectedIndices, queryHistory, isManageVisible, alarmMessage]);

            // ── 輔補函式：更新特定版本 ──────────────────────────────────────────
            const updateVersionItems = (versionId, updater) => {
                setVersions(prev => prev.map(v => {
                    if (v.id !== versionId) return v;
                    const items = typeof updater === 'function' ? updater(v.items) : updater;
                    return { ...v, items };
                }));
            };

            // ── 版本管理操作邏輯 ───────────────────────────────────────────────
            const handleCreateVersion = () => {
                const name = newVersionName.trim();
                if (!name) return;
                const id = Date.now().toString();
                const created = {
                    id, name, items: [],
                    createdAt: new Date().toLocaleString('zh-TW', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    })
                };
                setVersions(prev => [created, ...prev]);
                setAlarmMessage(`已成功建立並切換至新版本：「${name}」`);
                setActiveVersionId(id);
                setNewVersionName('');
                setShowNewVersionInput(false);
                setSelectedIndices(new Set());
                setResults([]);
            };

            const handleFolderSelect = async (evt) => {
                const files = Array.from(evt.target.files || []);
                const excelFiles = files.filter(file => {
                    const name = file.name;
                    const isExcel = name.endsWith('.xlsx') || name.endsWith('.xls') || name.endsWith('.csv');
                    const isTemp = name.startsWith('~$');
                    const depth = (file.webkitRelativePath.match(/\//g) || []).length;
                    return isExcel && !isTemp && depth <= 1;
                });

                if (excelFiles.length === 0) {
                    alert('在此目錄層中未找到有效的 Excel 或 CSV 檔案。');
                    return;
                }

                let newVersionsAdded = [];
                let latestId = null;
                let latestName = '';

                for (let file of excelFiles) {
                    const versionName = file.name.replace(/\.[^/.]+$/, "");
                    if (versions.some(v => v.name === versionName)) continue;

                    const fileItems = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const { imported } = parseXlsx(e.target.result, []);
                                resolve(imported);
                            } catch (err) { resolve([]); }
                        };
                        reader.readAsArrayBuffer(file);
                    });

                    latestId = (Date.now() + Math.random()).toString();
                    latestName = versionName;
                    newVersionsAdded.push({
                        id: latestId, name: versionName, items: fileItems,
                        createdAt: new Date().toLocaleString('zh-TW', {
                            year: 'numeric', month: '2-digit', day: '2-digit',
                            hour: '2-digit', minute: '2-digit'
                        })
                    });
                }

                if (newVersionsAdded.length > 0) {
                    setVersions(prev => [...newVersionsAdded, ...prev]);
                    if (latestId) {
                        setAlarmMessage(`已掃描目錄並載入最新版本：「${latestName}」`);
                        setActiveVersionId(latestId);
                        setSelectedIndices(new Set());
                        setResults([]);
                    }
                } else {
                    alert('目錄下的檔案名稱皆已存在於版本管理中，未新增任何版本。');
                }
                evt.target.value = '';
            };

            const handleLoadVersion = (id, targetName) => {
                if (id === activeVersionId) return;
                setAlarmMessage(`版本已成功切換至：「${targetName}」`);
                setActiveVersionId(id);
                setSelectedIndices(new Set());
                setResults([]);
                setInputValue('');
            };

            const handleDeleteVersion = (id) => {
                if (!confirm('確定要刪除此版本？')) return;
                setVersions(prev => prev.filter(v => v.id !== id));
                if (activeVersionId === id) {
                    setActiveVersionId(null);
                    setResults([]);
                    setAlarmMessage("已卸載當前版本");
                }
            };

            // ── 查詢功能 ──────────────────────────────────────────────────────
            const handleSearch = () => {
                if (!inputValue.trim()) { setResults([]); return; }
                const ids = inputValue.split(/[,，]/).map(s => s.trim()).filter(Boolean);
                const matched = dataList.filter(item => ids.includes(item.split('@')[0]));
                setResults(matched);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleSearch();
            };

            // ── 新增與刪除 ────────────────────────────────────────────────────
            const handleAddRecord = () => {
                if (!newNum1.trim() || !newNum2.trim() || !newDesc.trim()) {
                    alert('請填寫所有欄位'); return;
                }
                if (!activeVersionId) { alert('請先選擇或建立一個版本'); return; }
                if (dataList.some(item => item.split('@')[0] === newNum1.trim())) {
                    alert('編號1已存在，請使用不同的編號'); return;
                }
                const record = `${newNum1.trim()}@${newNum2.trim()} ${newDesc.trim()}`;
                updateVersionItems(activeVersionId, prev => [...prev, record]);
                setNewNum1(''); setNewNum2(''); setNewDesc('');
            };

            const toggleSelectRecord = (index) => {
                const next = new Set(selectedIndices);
                next.has(index) ? next.delete(index) : next.add(index);
                setSelectedIndices(next);
            };

            const toggleSelectAll = () => {
                if (selectedIndices.size === dataList.length && dataList.length > 0) {
                    setSelectedIndices(new Set());
                } else {
                    setSelectedIndices(new Set(dataList.map((_, i) => i)));
                }
            };

            const handleDeleteSelected = () => {
                if (selectedIndices.size === 0) { alert('請先選擇要刪除的測試項目'); return; }
                if (!confirm(`確定要刪除選中的 ${selectedIndices.size} 筆測試項目嗎？`)) return;
                updateVersionItems(activeVersionId, prev => prev.filter((_, i) => !selectedIndices.has(i)));
                setSelectedIndices(new Set());
            };

            const handleDeleteRecord = (index) => {
                if (!confirm('確定要刪除這筆測試項目嗎？')) return;
                updateVersionItems(activeVersionId, prev => prev.filter((_, i) => i !== index));
                const nextSelected = new Set(selectedIndices);
                nextSelected.delete(index);
                setSelectedIndices(nextSelected);
            };

            // ── 檔案解析器 ────────────────────────────────────────────────────
            const parseXlsx = (data, existingItems) => {
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                const existingIds = new Set(existingItems.map(item => item.split('@')[0]));
                const imported = [];
                let duplicates = 0;

                const start = (rows[0]?.[0] === '編號1' || String(rows[0]?.[0]).startsWith('編號')) ? 1 : 0;

                for (let i = start; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0) continue;
                    let record = '';

                    if (row.length === 1 && typeof row[0] === 'string' && row[0].includes('@')) {
                        record = row[0].trim();
                    } else if (row.length >= 2) {
                        const col0 = String(row[0] || '').trim();
                        const col1 = String(row[1] || '').trim();
                        if (row.length >= 3 && row[2] !== undefined && String(row[2]).trim() !== '') {
                            const col2 = String(row[2]).trim();
                            if (col0 && col1 && col2) record = `${col0}@${col1} ${col2}`;
                        } else if (col0.includes('@') && col1) {
                            record = `${col0} ${col1}`;
                        }
                    }

                    if (!record) continue;
                    const id = record.split('@')[0];
                    if (!existingIds.has(id)) {
                        imported.push(record);
                        existingIds.add(id);
                    } else { duplicates++; }
                }
                return { imported, duplicates };
            };

            // ── 檔案匯入處理 ──────────────────────────────────────────────────
            const handleFileUpload = (evt) => {
                const file = evt.target.files?.[0];
                if (!file || !activeVersionId) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const { imported, duplicates } = parseXlsx(e.target.result, dataList);
                        if (imported.length > 0) {
                            updateVersionItems(activeVersionId, prev => [...prev, ...imported]);
                            let msg = `成功匯入 ${imported.length} 筆測試項目`;
                            if (duplicates > 0) msg += `\n跳過 ${duplicates} 筆重複測試項目`;
                            alert(msg);
                        } else { alert('未找到有效的測試項目'); }
                    } catch (err) { alert('檔案解析失敗，請確認格式正確'); }
                };
                reader.readAsArrayBuffer(file);
                evt.target.value = '';
            };

            const handleVersionFileUpload = (evt) => {
                const file = evt.target.files?.[0];
                if (!file || !importTargetId) return;
                const targetVersion = versions.find(v => v.id === importTargetId);
                if (!targetVersion) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const { imported, duplicates } = parseXlsx(e.target.result, targetVersion.items);
                        if (imported.length > 0) {
                            updateVersionItems(importTargetId, prev => [...prev, ...imported]);
                            setAlarmMessage(`已匯入並切換至版本：「${targetVersion.name}」`);
                            setActiveVersionId(importTargetId);
                            setSelectedIndices(new Set());
                        } else { alert('未找到有效的測試項目'); }
                    } catch (err) { alert('檔案解析失敗，請確認格式正確'); }
                };
                reader.readAsArrayBuffer(file);
                setImportTargetId(null);
                evt.target.value = '';
            };

            const triggerVersionImport = (versionId) => {
                setImportTargetId(versionId);
                setTimeout(() => versionFileRef.current?.click(), 0);
            };

            // ── 複製與歷史記錄（💡 新增寫入版本資訊） ────────────────────────────
            const handleCopyResults = () => {
                if (results.length === 0) { alert('沒有可複製的查詢結果'); return; }
                const resultText = results.join(', ');

                const timeString = new Date().toLocaleString('zh-TW', { 
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
                });

                navigator.clipboard.writeText(resultText)
                    .then(() => {
                        alert('已複製到剪貼簿！\n\n' + resultText);
                        
                        // 💡 在歷史紀錄物件中額外加入 versionName
                        setQueryHistory(prev => [...prev, {
                            id: Date.now(),
                            versionName: activeVersion ? activeVersion.name : '未選擇版本',
                            queryText: inputValue.trim(),
                            resultText: resultText,
                            timestamp: timeString
                        }].slice(-50));
                    })
                    .catch(() => alert('複製失敗，請手動複製。'));
            };

            // 💡 新增功能：單筆刪除歷史紀錄
            const handleDeleteHistoryItem = (id) => {
                setQueryHistory(prev => prev.filter(h => h.id !== id));
            };

            const handleExportHistory = () => {
                if (queryHistory.length === 0) { alert('沒有查詢歷史可以匯出'); return; }
                const exportData = queryHistory.map((h, i) => ({
                    '序號': i + 1, '時間': h.timestamp, '查詢版本': h.versionName || '無', '輸入條件': h.queryText, '查詢結果': h.resultText
                }));
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '查詢歷史');
                XLSX.writeFile(wb, `查詢歷史_${new Date().toISOString().slice(0, 10)}.csv`, { bookType: 'csv' });
            };

            // ── UI 渲染 ──────────────────────────────────────────────────────
            return e('div', { className: 'min-h-screen flex relative' },
                e('input', { ref: fileInputRef, type: 'file', accept: '.xlsx,.xls,.csv', onChange: handleFileUpload, className: 'hidden' }),
                e('input', { ref: versionFileRef, type: 'file', accept: '.xlsx,.xls,.csv', onChange: handleVersionFileUpload, className: 'hidden' }),
                e('input', { ref: folderInputRef, type: 'file', webkitdirectory: '', directory: '', onChange: handleFolderSelect, className: 'hidden' }),

                // Alarm 浮動通知元件
                alarmMessage && e('div', { className: 'fixed top-4 right-4 z-50 transform transition-all duration-300 ease-out bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-slate-700 animate-bounce' },
                    e('i', { 'data-lucide': 'bell', className: 'w-5 h-5 text-amber-400 shrink-0' }),
                    e('span', { className: 'text-sm font-medium' }, alarmMessage)
                ),

                // ── 左側：版本管理 Sidebar ──
                e('aside', { className: 'w-64 shrink-0 bg-white border-r border-gray-200 shadow-md flex flex-col' },
                    e('div', { className: 'bg-gradient-to-b from-slate-700 to-slate-800 px-4 py-5' },
                        e('h2', { className: 'text-white font-bold text-base flex items-center gap-2' }, e('i', { 'data-lucide': 'folder-open', className: 'w-5 h-5' }), '版本管理'),
                        e('p', { className: 'text-slate-400 text-xs mt-0.5' }, '測試項目版本清單管理')
                    ),
                    e('div', { className: 'flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar' },
                        versions.length === 0 ? e('p', { className: 'text-gray-400 text-xs text-center py-6 leading-relaxed' }, '尚無版本\n請點擊下方\n按鈕建立') :
                        versions.map(v => {
                            const isActive = v.id === activeVersionId;
                            return e('div', { key: v.id, className: `rounded-lg border transition-all ${isActive ? 'bg-blue-50 border-blue-300 shadow-sm' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}` },
                                e('button', { onClick: () => handleLoadVersion(v.id, v.name), className: 'w-full text-left px-3 py-2 flex items-start gap-2' },
                                    e('i', { 'data-lucide': isActive ? 'folder-open' : 'folder', className: `w-4 h-4 mt-0.5 shrink-0 ${isActive ? 'text-blue-600' : 'text-gray-400'}` }),
                                    e('div', { className: 'flex-1 min-w-0' },
                                        e('p', { className: `text-sm font-semibold truncate ${isActive ? 'text-blue-700' : 'text-gray-700'}` }, v.name),
                                        e('p', { className: 'text-xs text-gray-400' }, `${v.items.length} 筆項目`)
                                    )
                                ),
                                e('div', { className: 'flex border-t border-gray-200 divide-x divide-gray-200' },
                                    e('button', { onClick: () => triggerVersionImport(v.id), className: 'flex-1 py-1.5 flex items-center justify-center gap-1 text-xs text-emerald-600 hover:bg-emerald-50 transition-colors rounded-bl-lg font-medium' }, e('i', { 'data-lucide': 'upload', className: 'w-3 h-3' }), '匯入'),
                                    e('button', { onClick: () => handleDeleteVersion(v.id), className: 'flex-1 py-1.5 flex items-center justify-center gap-1 text-xs text-red-500 hover:bg-red-50 transition-colors rounded-br-lg font-medium' }, e('i', { 'data-lucide': 'trash-2', className: 'w-3 h-3' }), '刪除')
                                )
                            );
                        })
                    ),
                    e('div', { className: 'p-3 border-t border-gray-200 bg-gray-50 space-y-2' },
                        showNewVersionInput ? e('div', { className: 'space-y-2' },
                            e('input', {
                                autoFocus: true, type: 'text', value: newVersionName,
                                onChange: e => setNewVersionName(e.target.value),
                                onKeyDown: e => { if (e.key === 'Enter') handleCreateVersion(); if (e.key === 'Escape') { setShowNewVersionInput(false); setNewVersionName(''); } },
                                placeholder: '版本名稱…', className: 'w-full px-2.5 py-1.5 text-sm border-2 border-blue-400 rounded-lg focus:outline-none'
                            }),
                            e('div', { className: 'flex gap-1.5' },
                                e('button', { onClick: handleCreateVersion, className: 'flex-1 py-1.5 bg-blue-600 text-white text-xs rounded-lg font-semibold hover:bg-blue-700' }, '建立'),
                                e('button', { onClick: () => { setShowNewVersionInput(false); setNewVersionName(''); }, className: 'px-2.5 py-1.5 bg-gray-200 text-gray-600 text-xs rounded-lg' }, e('i', { 'data-lucide': 'x', className: 'w-3 h-3' }))
                            )
                        ) : e('button', { onClick: () => setShowNewVersionInput(true), className: 'w-full py-2 flex items-center justify-center gap-1.5 text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-300 rounded-lg hover:bg-blue-100' }, e('i', { 'data-lucide': 'plus', className: 'w-4 h-4' }), '手動新增版本'),
                        
                        e('button', { 
                            onClick: () => folderInputRef.current?.click(), 
                            className: 'w-full py-2 flex items-center justify-center gap-1.5 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-300 rounded-lg hover:bg-emerald-100 transition-colors' 
                        }, e('i', { 'data-lucide': 'scan', className: 'w-4 h-4' }), '掃描目錄 Excel 建立版本')
                    )
                ),

                // ── 右側：主要工作區域 ──
                e('main', { className: 'flex-1 overflow-auto p-6' },
                    e('div', { className: 'max-w-4xl mx-auto space-y-6' },
                        activeVersion ? e('div', { className: 'bg-blue-600 text-white rounded-xl px-5 py-3 flex items-center gap-3 shadow' },
                            e('i', { 'data-lucide': 'folder-open', className: 'w-5 h-5' }),
                            e('span', { className: 'font-semibold' }, `目前版本：${activeVersion.name}`),
                            e('span', { className: 'text-blue-200 text-sm' }, `（${dataList.length} 筆測試項目）`)
                        ) : null,

                        e('div', { className: 'flex flex-col gap-6' },
                            
                            // 【順序 1】 ── 測試項目查詢 ──
                            e('div', { className: 'bg-white rounded-2xl shadow-xl overflow-hidden' },
                                e('div', { className: 'bg-gradient-to-r from-blue-600 to-indigo-600 p-5' },
                                    e('h1', { className: 'text-white text-xl font-bold text-center' }, '測試項目查詢'),
                                    e('p', { className: 'text-blue-100 text-center text-sm mt-1' }, '輸入編號1查詢完整測試項目')
                                ),
                                e('div', { className: 'p-5' },
                                    !activeVersion ? e('div', { className: 'mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-700 font-medium' }, '請先在左側選單選擇或新增一個版本') : null,
                                    e('div', { className: 'mb-5' },
                                        e('label', { className: 'block text-gray-700 font-semibold mb-2 text-sm' }, '輸入編號1：'),
                                        e('div', { className: 'flex gap-2' },
                                            e('input', {
                                                type: 'text', value: inputValue, onChange: e => setInputValue(e.target.value), onKeyDown: handleKeyDown,
                                                placeholder: '例如: 101,103,105', disabled: !activeVersion,
                                                className: 'flex-1 px-3 py-2.5 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 disabled:bg-gray-100'
                                            }),
                                            e('button', { onClick: handleSearch, disabled: !activeVersion, className: 'px-4 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 flex items-center gap-2 disabled:bg-gray-400' }, e('i', { 'data-lucide': 'search', className: 'w-4 h-4' }), '查詢')
                                        )
                                    ),
                                    e('div', null,
                                        e('div', { className: 'flex items-center justify-between mb-2' },
                                            e('label', { className: 'block text-gray-700 font-semibold text-sm' }, '查詢結果：'),
                                            results.length > 0 ? e('button', { onClick: handleCopyResults, className: 'px-3 py-1 text-xs bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 flex items-center gap-1' }, e('i', { 'data-lucide': 'copy', className: 'w-3 h-3' }), '複製結果') : null
                                        ),
                                        e('div', { className: 'min-h-[150px] border-2 border-gray-200 rounded-lg p-4 bg-gray-50' },
                                            (results.length === 0 && inputValue.trim() !== '') ? e('p', { className: 'text-center text-gray-500 py-6 text-sm' }, '未找到匹配的記錄') : null,
                                            (results.length === 0 && inputValue.trim() === '') ? e('p', { className: 'text-center text-gray-400 py-6 text-sm' }, '請在上方輸入編號1進行查詢') : null,
                                            results.length > 0 ? e('div', { className: 'space-y-2' },
                                                results.map((r, i) => e('div', { key: i, className: 'bg-white p-3 rounded-lg shadow-sm border-l-4 border-blue-500' }, e('div', { className: 'font-mono text-sm text-gray-800' }, r)))
                                            ) : null
                                        )
                                    )
                                )
                            ),

                            // 【順序 2】 ── 💡 查詢歷史紀錄區塊（加入版本資訊、支援單筆刪除） ──
                            queryHistory.length > 0 ? e('div', { className: 'bg-white rounded-2xl shadow-xl overflow-hidden' },
                                e('div', { className: 'bg-gradient-to-r from-purple-600 to-pink-600 p-5 flex items-center justify-between' },
                                    e('div', null,
                                        e('h2', { className: 'text-white font-bold text-sm sm:text-base' }, `查詢歷史記錄 (${queryHistory.length})`),
                                        e('p', { className: 'text-purple-200 text-xs mt-0.5' }, '記錄每次複製的查詢結果與當時查詢的版本')
                                    ),
                                    e('div', { className: 'flex gap-2' },
                                        e('button', { onClick: handleExportHistory, className: 'px-3 py-1.5 bg-white text-purple-700 text-xs rounded-lg font-semibold flex items-center gap-1' }, e('i', { 'data-lucide': 'download', className: 'w-3 h-3' }), '匯出 CSV'),
                                        e('button', { onClick: () => { if (confirm('確定要清空所有查詢歷史嗎？')) setQueryHistory([]); }, className: 'px-3 py-1.5 bg-red-600 text-white text-xs rounded-lg font-semibold' }, '清空')
                                    )
                                ),
                                e('div', { ref: historyContainerRef, className: 'max-h-[250px] overflow-auto custom-scrollbar p-4' },
                                    e('table', { className: 'w-full text-sm border-collapse' },
                                        e('thead', null,
                                            e('tr', { className: 'bg-gray-100 border-b border-gray-300 text-left text-gray-700 text-xs' },
                                                e('th', { className: 'px-3 py-2 w-12' }, '序號'),
                                                e('th', { className: 'px-3 py-2 w-36 truncate' }, '查詢版本'),
                                                e('th', { className: 'px-3 py-2' }, '查詢結果'),
                                                e('th', { className: 'px-3 py-2 whitespace-nowrap w-40' }, '時間'),
                                                e('th', { className: 'px-3 py-2 w-12 text-center' }, '操作')
                                            )
                                        ),
                                        e('tbody', { className: 'divide-y divide-gray-200 text-xs' },
                                            queryHistory.map((h, i) => e('tr', { key: h.id, className: 'hover:bg-gray-50 group transition-colors' },
                                                e('td', { className: 'px-3 py-2.5 text-gray-600' }, i + 1),
                                                e('td', { className: 'px-3 py-2.5 font-medium text-purple-700 truncate max-w-[150px]' }, h.versionName || '預設版本'),
                                                e('td', { className: 'px-3 py-2.5 font-mono text-gray-800 break-all' }, h.resultText),
                                                e('td', { className: 'px-3 py-2.5 text-gray-500 whitespace-nowrap' }, h.timestamp),
                                                // 單筆刪除歷史紀錄按鈕 (滑鼠懸停時自動浮現)
                                                e('td', { className: 'px-3 py-2.5 text-center' }, 
                                                    e('button', { 
                                                        onClick: () => handleDeleteHistoryItem(h.id),
                                                        className: 'p-1 text-red-500 hover:bg-red-100 rounded opacity-0 group-hover:opacity-100 transition-opacity' 
                                                    }, e('i', { 'data-lucide': 'trash-2', className: 'w-3.5 h-3.5' }))
                                                )
                                            ))
                                        )
                                    )
                                )
                            ) : null,

                            // 【順序 3】 ── 測試項目管理 ──
                            e('div', { className: 'bg-white rounded-2xl shadow-xl overflow-hidden' },
                                e('div', { 
                                    onClick: () => setIsManageVisible(!isManageVisible),
                                    className: 'bg-gradient-to-r from-emerald-600 to-green-600 p-5 flex items-center justify-between cursor-pointer select-none hover:brightness-95 transition-all' 
                                    },
                                    e('div', null,
                                        e('h1', { className: 'text-white text-xl font-bold flex items-center gap-2' }, 
                                            '測試項目管理',
                                            e('span', { className: 'text-xs bg-emerald-500 text-emerald-100 px-2 py-0.5 rounded-full font-normal' }, isManageVisible ? '點擊隱藏' : '點擊展開')
                                        ),
                                        e('p', { className: 'text-green-100 text-sm mt-1' }, activeVersion ? `目前版本：${activeVersion.name}` : '請先選擇版本')
                                    ),
                                    e('i', { 'data-lucide': isManageVisible ? 'chevron-up' : 'chevron-down', className: 'w-6 h-6 text-white' })
                                ),
                                isManageVisible && e('div', { className: 'p-5 border-t border-gray-100 transition-all duration-300' },
                                    e('div', { className: 'mb-5 p-3 bg-amber-50 rounded-lg border border-amber-200' },
                                        e('h3', { className: 'font-semibold text-amber-900 mb-2 text-sm' }, '匯入測試項目'),
                                        e('button', { onClick: () => fileInputRef.current?.click(), disabled: !activeVersion, className: 'w-full px-4 py-2 bg-emerald-600 text-white rounded-lg font-semibold flex items-center justify-center gap-2 text-sm disabled:bg-gray-300' }, e('i', { 'data-lucide': 'upload', className: 'w-4 h-4' }), '匯入 Excel / CSV 至目前版本'),
                                        e('p', { className: 'mt-2 text-xs text-amber-700' }, '格式：第一欄 編號1@編號2，第二欄 測試項目名稱')
                                    ),
                                    e('div', { className: 'mb-5 p-3 bg-green-50 rounded-lg border border-green-200' },
                                        e('h3', { className: 'font-semibold text-green-900 mb-3 text-sm' }, '手動新增測試項目'),
                                        e('div', { className: 'space-y-2' },
                                            e('input', { type: 'text', value: newNum1, onChange: e => setNewNum1(e.target.value), placeholder: '編號1（例如：111）', disabled: !activeVersion, className: 'w-full px-3 py-2 text-sm border-2 border-gray-300 rounded-lg focus:border-green-500 disabled:bg-gray-100' }),
                                            e('input', { type: 'text', value: newNum2, onChange: e => setNewNum2(e.target.value), placeholder: '編號2（例如：2001）', disabled: !activeVersion, className: 'w-full px-3 py-2 text-sm border-2 border-gray-300 rounded-lg focus:border-green-500 disabled:bg-gray-100' }),
                                            e('input', { type: 'text', value: newDesc, onChange: e => setNewDesc(e.target.value), placeholder: '測試項目（例如：Battery Right Voltage）', disabled: !activeVersion, className: 'w-full px-3 py-2 text-sm border-2 border-gray-300 rounded-lg focus:border-green-500 disabled:bg-gray-100' }),
                                            e('button', { onClick: handleAddRecord, disabled: !activeVersion, className: 'w-full px-4 py-2 bg-green-600 text-white rounded-lg font-semibold flex items-center justify-center gap-2 text-sm disabled:bg-gray-300' }, e('i', { 'data-lucide': 'plus', className: 'w-4 h-4' }), '新增測試項目')
                                        )
                                    ),
                                    e('div', null,
                                        e('div', { className: 'flex items-center justify-between mb-2' },
                                            e('h3', { className: 'font-semibold text-gray-700 text-sm' }, `現有測試項目 (${dataList.length} 筆)`, selectedIndices.size > 0 ? e('span', { className: 'text-blue-600 ml-2' }, `（已選 ${selectedIndices.size}）`) : null),
                                            e('div', { className: 'flex gap-1.5' },
                                                e('button', { onClick: toggleSelectAll, disabled: dataList.length === 0, className: 'px-2 py-1 text-xs bg-blue-600 text-white rounded-lg flex items-center gap-1 disabled:bg-gray-300' }, e('i', { 'data-lucide': selectedIndices.size === dataList.length && dataList.length > 0 ? 'square' : 'check-square', className: 'w-3 h-3' }), selectedIndices.size === dataList.length && dataList.length > 0 ? '取消全選' : '全選'),
                                                e('button', { onClick: handleDeleteSelected, disabled: selectedIndices.size === 0, className: 'px-2 py-1 text-xs bg-red-600 text-white rounded-lg flex items-center gap-1 disabled:bg-gray-300' }, e('i', { 'data-lucide': 'trash-2', className: 'w-3 h-3' }), '刪除選中')
                                            )
                                        ),
                                        e('div', { className: 'max-h-64 overflow-y-auto border-2 border-gray-200 rounded-lg bg-gray-50 custom-scrollbar' },
                                            dataList.length === 0 ? e('div', { className: 'text-center text-gray-400 py-8 text-sm' }, activeVersion ? '尚無測試項目' : '請先在左側選擇版本') :
                                            e('div', { className: 'divide-y divide-gray-200' },
                                                dataList.map((item, idx) => e('div', { key: idx, className: `px-3 py-2 flex items-center gap-2 group transition-colors ${selectedIndices.has(idx) ? 'bg-blue-50' : 'hover:bg-gray-100'}` },
                                                    e('input', { type: 'checkbox', checked: selectedIndices.has(idx), onChange: () => toggleSelectRecord(idx), className: 'w-3.5 h-3.5 text-blue-600 rounded cursor-pointer' }),
                                                    e('div', { className: 'font-mono text-xs text-gray-800 flex-1 truncate' }, item),
                                                    e('button', { onClick: () => handleDeleteRecord(idx), className: 'p-1 text-red-500 hover:bg-red-100 rounded opacity-0 group-hover:opacity-100 transition-opacity' }, e('i', { 'data-lucide': 'trash-2', className: 'w-3.5 h-3.5' }))
                                                ))
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
